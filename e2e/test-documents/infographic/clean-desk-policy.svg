<!-- First Digital — Clean Desk Policy Infographic — DWx Policy Manager -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>

  <rect width="600" height="700" fill="#fff" rx="8"/>
  <rect width="600" height="100" fill="url(#hg)" rx="8"/>
  <rect y="92" width="600" height="16" fill="url(#hg)"/>
  <text x="300" y="50" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="26" font-weight="700">Clean Desk Policy</text>
  <text x="300" y="75" text-anchor="middle" fill="#ccfbf1" font-family="Segoe UI, Arial" font-size="13">Secure your workspace — protect our data</text>

  <!-- Before You Leave -->
  <text x="300" y="135" text-anchor="middle" fill="#0d9488" font-family="Segoe UI, Arial" font-size="18" font-weight="700">Before You Leave Your Desk</text>

  <!-- Checklist items -->
  <rect x="40" y="155" width="520" height="44" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <rect x="50" y="169" width="16" height="16" rx="3" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="80" y="182" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Lock your computer (Win + L or Cmd + Ctrl + Q)</text>

  <rect x="40" y="207" width="520" height="44" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <rect x="50" y="221" width="16" height="16" rx="3" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="80" y="234" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Store documents in locked drawers or cabinets</text>

  <rect x="40" y="259" width="520" height="44" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <rect x="50" y="273" width="16" height="16" rx="3" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="80" y="286" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Remove sensitive documents from printers immediately</text>

  <rect x="40" y="311" width="520" height="44" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <rect x="50" y="325" width="16" height="16" rx="3" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="80" y="338" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Secure USB drives, external media, and access cards</text>

  <rect x="40" y="363" width="520" height="44" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <rect x="50" y="377" width="16" height="16" rx="3" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="80" y="390" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Shred confidential waste — never use regular recycling</text>

  <rect x="40" y="415" width="520" height="44" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <rect x="50" y="429" width="16" height="16" rx="3" fill="none" stroke="#0d9488" stroke-width="1.5"/>
  <text x="80" y="442" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Clear whiteboards of sensitive information after meetings</text>

  <!-- Why It Matters -->
  <rect x="40" y="480" width="520" height="100" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="300" y="510" text-anchor="middle" fill="#d97706" font-family="Segoe UI, Arial" font-size="16" font-weight="700">Why It Matters</text>
  <text x="300" y="535" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="12">An unsecured desk is an open invitation to data theft. Visitors,</text>
  <text x="300" y="552" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="12">cleaning staff, and unauthorised individuals can access sensitive</text>
  <text x="300" y="569" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="12">information left in the open — including client data and credentials.</text>

  <!-- End of Day -->
  <rect x="40" y="600" width="250" height="60" rx="6" fill="#f0fdf4" stroke="#059669" stroke-width="1"/>
  <text x="165" y="625" text-anchor="middle" fill="#059669" font-family="Segoe UI, Arial" font-size="13" font-weight="700">End of Day</text>
  <text x="165" y="645" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Completely clear desk surface</text>

  <rect x="310" y="600" width="250" height="60" rx="6" fill="#f0fdfa" stroke="#0d9488" stroke-width="1"/>
  <text x="435" y="625" text-anchor="middle" fill="#0d9488" font-family="Segoe UI, Arial" font-size="13" font-weight="700">Quick Break</text>
  <text x="435" y="645" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Lock screen, flip documents over</text>

  <text x="300" y="690" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="10">First Digital — DWx Policy Manager — POL-IT-001 Information Security Policy</text>
</svg>
