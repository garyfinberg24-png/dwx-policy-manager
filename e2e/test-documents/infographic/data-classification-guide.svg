<!-- First Digital — Data Classification Guide — DWx Policy Manager -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>

  <rect width="600" height="700" fill="#fff" rx="8"/>
  <rect width="600" height="100" fill="url(#hg)" rx="8"/>
  <rect y="92" width="600" height="16" fill="url(#hg)"/>
  <text x="300" y="48" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="26" font-weight="700">Data Classification</text>
  <text x="300" y="73" text-anchor="middle" fill="#ccfbf1" font-family="Segoe UI, Arial" font-size="13">Quick Reference Guide — Know How to Handle Our Data</text>

  <!-- Restricted -->
  <rect x="30" y="120" width="540" height="120" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <rect x="30" y="120" width="80" height="120" rx="8" fill="#dc2626"/>
  <rect x="102" y="120" width="8" height="120" fill="#dc2626"/>
  <text x="70" y="170" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="14" font-weight="700" transform="rotate(-90 70 170)">RESTRICTED</text>
  <text x="130" y="148" fill="#dc2626" font-family="Segoe UI, Arial" font-size="16" font-weight="700">Restricted</text>
  <text x="130" y="168" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Board papers, M&amp;A documents, API keys, encryption keys, legal privilege</text>
  <text x="130" y="188" fill="#334155" font-family="Segoe UI, Arial" font-size="11" font-weight="600">Access: Named individuals only | Storage: Encrypted vault | Sharing: Never external</text>
  <text x="130" y="208" fill="#64748b" font-family="Segoe UI, Arial" font-size="10">Breach impact: Severe financial loss, legal liability, existential business risk</text>
  <text x="130" y="228" fill="#dc2626" font-family="Segoe UI, Arial" font-size="10" font-weight="600">Printing: Not permitted | Email: Encrypted only | USB: Prohibited</text>

  <!-- Confidential -->
  <rect x="30" y="252" width="540" height="120" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <rect x="30" y="252" width="80" height="120" rx="8" fill="#d97706"/>
  <rect x="102" y="252" width="8" height="120" fill="#d97706"/>
  <text x="70" y="305" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="13" font-weight="700" transform="rotate(-90 70 305)">CONFIDENTIAL</text>
  <text x="130" y="280" fill="#d97706" font-family="Segoe UI, Arial" font-size="16" font-weight="700">Confidential</text>
  <text x="130" y="300" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Employee records, financial reports, client contracts, salary data, health information</text>
  <text x="130" y="320" fill="#334155" font-family="Segoe UI, Arial" font-size="11" font-weight="600">Access: Role-based need-to-know | Storage: SharePoint with permissions | Sharing: NDA required</text>
  <text x="130" y="340" fill="#64748b" font-family="Segoe UI, Arial" font-size="10">Breach impact: Regulatory penalties, client trust damage, privacy violations</text>
  <text x="130" y="360" fill="#d97706" font-family="Segoe UI, Arial" font-size="10" font-weight="600">Printing: Collect immediately | Email: Internal only, BCC for bulk | USB: Encrypted only</text>

  <!-- Internal -->
  <rect x="30" y="384" width="540" height="120" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <rect x="30" y="384" width="80" height="120" rx="8" fill="#0d9488"/>
  <rect x="102" y="384" width="8" height="120" fill="#0d9488"/>
  <text x="70" y="440" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="14" font-weight="700" transform="rotate(-90 70 440)">INTERNAL</text>
  <text x="130" y="412" fill="#0d9488" font-family="Segoe UI, Arial" font-size="16" font-weight="700">Internal</text>
  <text x="130" y="432" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Policies, procedures, org charts, project plans, internal communications, training materials</text>
  <text x="130" y="452" fill="#334155" font-family="Segoe UI, Arial" font-size="11" font-weight="600">Access: All employees | Storage: SharePoint, OneDrive | Sharing: Internal only (no external)</text>
  <text x="130" y="472" fill="#64748b" font-family="Segoe UI, Arial" font-size="10">Breach impact: Competitive disadvantage, minor operational disruption</text>
  <text x="130" y="492" fill="#0d9488" font-family="Segoe UI, Arial" font-size="10" font-weight="600">Printing: Standard | Email: Internal | USB: Permitted with encryption</text>

  <!-- Public -->
  <rect x="30" y="516" width="540" height="100" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="30" y="516" width="80" height="100" rx="8" fill="#94a3b8"/>
  <rect x="102" y="516" width="8" height="100" fill="#94a3b8"/>
  <text x="70" y="564" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="14" font-weight="700" transform="rotate(-90 70 564)">PUBLIC</text>
  <text x="130" y="544" fill="#64748b" font-family="Segoe UI, Arial" font-size="16" font-weight="700">Public</text>
  <text x="130" y="564" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Marketing materials, published blog posts, job advertisements, press releases</text>
  <text x="130" y="584" fill="#334155" font-family="Segoe UI, Arial" font-size="11" font-weight="600">Access: Anyone | Storage: Any | Sharing: Unrestricted (approved content only)</text>
  <text x="130" y="604" fill="#64748b" font-family="Segoe UI, Arial" font-size="10">No classification label required. Must be approved for public release by Communications.</text>

  <!-- When in doubt -->
  <rect x="30" y="630" width="540" height="35" rx="6" fill="#0d9488"/>
  <text x="300" y="653" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="13" font-weight="600">When in doubt, classify UP — it is safer to over-protect than under-protect.</text>

  <text x="300" y="690" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="10">First Digital — DWx Policy Manager — POL-IT-003 Data Classification Policy</text>
</svg>
