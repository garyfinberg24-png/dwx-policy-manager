<!-- First Digital — Sustainability Goals Infographic — DWx Policy Manager -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>

  <rect width="600" height="700" fill="#fff" rx="8"/>
  <rect width="600" height="100" fill="url(#hg)" rx="8"/>
  <rect y="92" width="600" height="16" fill="url(#hg)"/>
  <text x="300" y="45" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="24" font-weight="700">Sustainability Goals 2026</text>
  <text x="300" y="70" text-anchor="middle" fill="#ccfbf1" font-family="Segoe UI, Arial" font-size="13">First Digital — Our Commitment to a Greener Future</text>

  <!-- Goal 1: Carbon -->
  <rect x="30" y="120" width="540" height="80" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <circle cx="80" cy="160" r="28" fill="#059669"/>
  <text x="80" y="155" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="22" font-weight="700">1</text>
  <text x="80" y="170" text-anchor="middle" fill="#d1fae5" font-family="Segoe UI, Arial" font-size="8">CARBON</text>
  <text x="125" y="147" fill="#059669" font-family="Segoe UI, Arial" font-size="15" font-weight="700">Net Zero by 2030</text>
  <text x="125" y="166" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Reduce carbon emissions by 50% from 2024 baseline by end of 2027.</text>
  <text x="125" y="184" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Offset remaining emissions through verified carbon credit programmes.</text>
  <!-- Progress bar -->
  <rect x="125" y="190" width="420" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="125" y="190" width="126" height="4" rx="2" fill="#059669"/>
  <text x="555" y="197" text-anchor="end" fill="#059669" font-family="Segoe UI, Arial" font-size="9" font-weight="600">30%</text>

  <!-- Goal 2: Energy -->
  <rect x="30" y="212" width="540" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="80" cy="252" r="28" fill="#2563eb"/>
  <text x="80" y="247" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="22" font-weight="700">2</text>
  <text x="80" y="262" text-anchor="middle" fill="#bfdbfe" font-family="Segoe UI, Arial" font-size="8">ENERGY</text>
  <text x="125" y="239" fill="#2563eb" font-family="Segoe UI, Arial" font-size="15" font-weight="700">100% Renewable Energy</text>
  <text x="125" y="258" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Transition all offices and data centres to renewable energy sources.</text>
  <text x="125" y="276" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Sydney and Melbourne offices already on green energy contracts.</text>
  <rect x="125" y="282" width="420" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="125" y="282" width="252" height="4" rx="2" fill="#2563eb"/>
  <text x="555" y="289" text-anchor="end" fill="#2563eb" font-family="Segoe UI, Arial" font-size="9" font-weight="600">60%</text>

  <!-- Goal 3: Waste -->
  <rect x="30" y="304" width="540" height="80" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <circle cx="80" cy="344" r="28" fill="#ca8a04"/>
  <text x="80" y="339" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="22" font-weight="700">3</text>
  <text x="80" y="354" text-anchor="middle" fill="#fef9c3" font-family="Segoe UI, Arial" font-size="8">WASTE</text>
  <text x="125" y="331" fill="#ca8a04" font-family="Segoe UI, Arial" font-size="15" font-weight="700">Zero Waste to Landfill</text>
  <text x="125" y="350" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Divert 95% of office waste from landfill through recycling and composting.</text>
  <text x="125" y="368" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Eliminate single-use plastics from all offices by December 2026.</text>
  <rect x="125" y="374" width="420" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="125" y="374" width="336" height="4" rx="2" fill="#ca8a04"/>
  <text x="555" y="381" text-anchor="end" fill="#ca8a04" font-family="Segoe UI, Arial" font-size="9" font-weight="600">80%</text>

  <!-- Goal 4: Paper -->
  <rect x="30" y="396" width="540" height="80" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <circle cx="80" cy="436" r="28" fill="#0d9488"/>
  <text x="80" y="431" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="22" font-weight="700">4</text>
  <text x="80" y="446" text-anchor="middle" fill="#ccfbf1" font-family="Segoe UI, Arial" font-size="8">PAPER</text>
  <text x="125" y="423" fill="#0d9488" font-family="Segoe UI, Arial" font-size="15" font-weight="700">Paperless Office</text>
  <text x="125" y="442" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Reduce paper consumption by 90% vs 2023 through digital-first workflows.</text>
  <text x="125" y="460" fill="#334155" font-family="Segoe UI, Arial" font-size="11">DWx Policy Manager has already eliminated paper policy distribution.</text>
  <rect x="125" y="466" width="420" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="125" y="466" width="294" height="4" rx="2" fill="#0d9488"/>
  <text x="555" y="473" text-anchor="end" fill="#0d9488" font-family="Segoe UI, Arial" font-size="9" font-weight="600">70%</text>

  <!-- Goal 5: Community -->
  <rect x="30" y="488" width="540" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <circle cx="80" cy="528" r="28" fill="#7c3aed"/>
  <text x="80" y="523" text-anchor="middle" fill="#fff" font-family="Segoe UI, Arial" font-size="22" font-weight="700">5</text>
  <text x="80" y="538" text-anchor="middle" fill="#e9d5ff" font-family="Segoe UI, Arial" font-size="8">SOCIAL</text>
  <text x="125" y="515" fill="#7c3aed" font-family="Segoe UI, Arial" font-size="15" font-weight="700">Community Impact</text>
  <text x="125" y="534" fill="#334155" font-family="Segoe UI, Arial" font-size="11">1,000 volunteer hours annually across all offices.</text>
  <text x="125" y="552" fill="#334155" font-family="Segoe UI, Arial" font-size="11">$100K annual donation to digital literacy programmes.</text>
  <rect x="125" y="558" width="420" height="4" rx="2" fill="#e2e8f0"/>
  <rect x="125" y="558" width="189" height="4" rx="2" fill="#7c3aed"/>
  <text x="555" y="565" text-anchor="end" fill="#7c3aed" font-family="Segoe UI, Arial" font-size="9" font-weight="600">45%</text>

  <!-- How You Can Help -->
  <rect x="30" y="585" width="540" height="75" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="300" y="610" text-anchor="middle" fill="#0d9488" font-family="Segoe UI, Arial" font-size="14" font-weight="700">How You Can Help</text>
  <text x="120" y="632" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Print less</text>
  <text x="240" y="632" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Recycle right</text>
  <text x="360" y="632" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Switch off lights</text>
  <text x="480" y="632" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Volunteer</text>

  <text x="300" y="690" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="10">First Digital — DWx Policy Manager — Environmental Sustainability Programme</text>
</svg>
