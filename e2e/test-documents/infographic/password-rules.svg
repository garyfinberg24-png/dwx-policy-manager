<!-- First Digital — Password Rules Infographic — DWx Policy Manager -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="#ffffff" rx="8"/>

  <!-- Header -->
  <rect width="600" height="120" fill="url(#headerGrad)" rx="8"/>
  <rect y="110" width="600" height="20" fill="url(#headerGrad)"/>
  <text x="300" y="55" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Password Security</text>
  <text x="300" y="85" text-anchor="middle" fill="#ccfbf1" font-family="Segoe UI, Arial" font-size="14">Do's and Don'ts — First Digital</text>

  <!-- Lock Icon -->
  <circle cx="300" cy="170" r="30" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <rect x="286" y="165" width="28" height="22" rx="3" fill="none" stroke="#0d9488" stroke-width="2.5"/>
  <path d="M292 165 V158 A8 8 0 0 1 308 158 V165" fill="none" stroke="#0d9488" stroke-width="2.5"/>
  <circle cx="300" cy="175" r="2.5" fill="#0d9488"/>

  <!-- DO Section -->
  <rect x="30" y="210" width="250" height="340" rx="8" fill="#f0fdf4" stroke="#059669" stroke-width="1.5"/>
  <rect x="30" y="210" width="250" height="40" rx="8" fill="#059669"/>
  <rect x="30" y="242" width="250" height="8" fill="#059669"/>
  <text x="155" y="237" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial" font-size="18" font-weight="700">DO</text>

  <text x="50" y="278" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Use 14+ characters</text>
  <text x="50" y="296" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Longer passwords are exponentially harder to crack</text>

  <text x="50" y="325" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Mix character types</text>
  <text x="50" y="343" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Uppercase, lowercase, numbers, and symbols</text>

  <text x="50" y="372" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Use a password manager</text>
  <text x="50" y="390" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Approved tool: 1Password (company licence)</text>

  <text x="50" y="419" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Enable MFA everywhere</text>
  <text x="50" y="437" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Authenticator app preferred over SMS</text>

  <text x="50" y="466" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Use unique passwords</text>
  <text x="50" y="484" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Every account gets its own password</text>

  <text x="50" y="513" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Use passphrases</text>
  <text x="50" y="531" fill="#334155" font-family="Segoe UI, Arial" font-size="11">e.g. "Correct-Horse-Battery-Staple!"</text>

  <!-- DON'T Section -->
  <rect x="320" y="210" width="250" height="340" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="320" y="210" width="250" height="40" rx="8" fill="#dc2626"/>
  <rect x="320" y="242" width="250" height="8" fill="#dc2626"/>
  <text x="445" y="237" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial" font-size="18" font-weight="700">DON'T</text>

  <text x="340" y="278" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Use personal info</text>
  <text x="340" y="296" fill="#334155" font-family="Segoe UI, Arial" font-size="11">No birthdays, pet names, or addresses</text>

  <text x="340" y="325" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Write them down</text>
  <text x="340" y="343" fill="#334155" font-family="Segoe UI, Arial" font-size="11">No sticky notes on monitors or under keyboards</text>

  <text x="340" y="372" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Share credentials</text>
  <text x="340" y="390" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Never share passwords — even with IT</text>

  <text x="340" y="419" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Reuse passwords</text>
  <text x="340" y="437" fill="#334155" font-family="Segoe UI, Arial" font-size="11">One breach compromises all accounts</text>

  <text x="340" y="466" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Accept unknown MFA prompts</text>
  <text x="340" y="484" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Report unexpected MFA push notifications</text>

  <text x="340" y="513" fill="#0f172a" font-family="Segoe UI, Arial" font-size="13" font-weight="600">Use common patterns</text>
  <text x="340" y="531" fill="#334155" font-family="Segoe UI, Arial" font-size="11">Avoid Password1!, Welcome2026, etc.</text>

  <!-- Tip Box -->
  <rect x="30" y="570" width="540" height="80" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="300" y="600" text-anchor="middle" fill="#0d9488" font-family="Segoe UI, Arial" font-size="14" font-weight="700">Quick Tip: Password Strength</text>
  <text x="300" y="622" text-anchor="middle" fill="#334155" font-family="Segoe UI, Arial" font-size="12">8 chars = cracked in minutes | 12 chars = cracked in years | 16+ chars = practically uncrackable</text>
  <text x="300" y="640" text-anchor="middle" fill="#64748b" font-family="Segoe UI, Arial" font-size="11">Report compromised passwords to security@firstdigital.com immediately</text>

  <!-- Footer -->
  <text x="300" y="690" text-anchor="middle" fill="#94a3b8" font-family="Segoe UI, Arial" font-size="10">First Digital — DWx Policy Manager — POL-IT-002 Acceptable Use Policy</text>

  <!-- Decorative checkmarks and crosses -->
  <circle cx="40" cy="273" r="8" fill="#059669"/>
  <path d="M36 273 L39 276 L44 270" stroke="#fff" stroke-width="1.5" fill="none"/>
  <circle cx="330" cy="273" r="8" fill="#dc2626"/>
  <line x1="327" y1="270" x2="333" y2="276" stroke="#fff" stroke-width="1.5"/>
  <line x1="333" y1="270" x2="327" y2="276" stroke="#fff" stroke-width="1.5"/>
</svg>
